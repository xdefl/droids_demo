        <style>
            /* 1. Force the entire page to be black */
            html, body {
                background-color: #000000 !important;
                color: #cccccc;
                margin: 0;
                padding: 0;
                border: 0;
                overflow: hidden; /* Prevents scrollbars */
                height: 100%;
                width: 100%;
            }

            /* 2. Style the GameMaker container */
            div.gm4html5_div_class {
                background-color: #000000 !important;
                margin: 0;
                padding: 0;
                border: 0;
            }

            /* 3. Style the Canvas */
            canvas {
                image-rendering: pixelated;
                -webkit-interpolation-mode: nearest-neighbor;
                -ms-touch-action: none;
                touch-action: none;
                margin: 0;
                padding: 0;
                border: 0;
                /* Keep the canvas centered */
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            /* Login Box Styling */
            div.gm4html5_login {
                padding: 20px;
                position: absolute;
                border: solid 2px #000000;
                background-color: #404040;
                color:#00ff00;
                border-radius: 15px;
                box-shadow: #101010 20px 20px 40px;
            }
        </style>
